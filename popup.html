<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wacdo</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <section id="container-popup">
      <section id="popup">
        <div id="img-logo-croix">
          <img src="./assets/supprimer.png" alt="Logo croix Fermeture" />
        </div>
        <div id="container-titre-description-img">
          <div id="container-titre-descritpion-popup">
            <h2>Une petite soif ?</h2>
            <p id="texte-description-popup">Choisissez la taille de votre boisson, +0.50€ pour le format 50Cl</p>
          </div>
          <div id="container-choix-taille">
            <div id="container-taille">
              <div>
                <img id="img-petite-taille" src="./assets/boissons/coca-cola.png" alt="Illustration 30 Cl" />
              </div>
              <div>
                <span id="texte-choix-taille">30 Cl</span>
              </div>
            </div>
            <div class="container-taille">
              <div>
                <img id="img-grande-taille" src="./assets/boissons/coca-cola.png" alt="Illustration 50 Cl" />
              </div>
              <div>
                <span class="texte-choix-taille">50 Cl</span>
              </div>
            </div>
          </div>
        </div>
        <div id="container-parent-compteur">
          <div id="container-compteur">
            <button id="btn-moins">-</button>
            <span id="valeur-compteur"> 1 </span>
            <button id="btn-plus">+</button>
          </div>
        </div>
        <div id="container-btn-validation">
          <button id="btn-annuler-commande">Annuler</button>
          <button id="btn-ajouter-commande">Ajouter a ma commande</button>
        </div>
      </section>
    </section>
  </body>
</html>
